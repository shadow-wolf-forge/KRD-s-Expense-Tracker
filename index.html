<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>KRD's Expense Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #050a18;
  --surface: rgba(255,255,255,0.06);
  --surface2: rgba(255,255,255,0.10);
  --glass: rgba(15,30,80,0.45);
  --glass2: rgba(20,40,100,0.55);
  --border: rgba(100,160,255,0.20);
  --border2: rgba(120,180,255,0.35);
  --text: #e8f0ff;
  --text2: #9ab4e8;
  --muted: #5572a0;
  --accent: #4fa3ff;
  --accent2: #1a6fff;
  --blue-glow: rgba(79,163,255,0.28);
  --blue-glow2: rgba(79,163,255,0.14);
  --green: #5aefc0;
  --green2: #0ea572;
  --red: #ff6b8a;
  --cash: #ffd166;
  --gpay: #818cf8;
  --r: 18px;
  --rs: 12px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%;
  overscroll-behavior: none;
}

body {
  font-family: 'Comic Sans MS', 'Comic Neue', cursive;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 15px;
  -webkit-font-smoothing: antialiased;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 70% 50% at 10% -10%, rgba(30,80,220,0.35) 0%, transparent 60%),
    radial-gradient(ellipse 60% 45% at 90% 100%, rgba(100,60,255,0.25) 0%, transparent 55%),
    radial-gradient(ellipse 50% 40% at 50% 50%, rgba(10,40,140,0.18) 0%, transparent 70%);
  z-index: 0;
  pointer-events: none;
}

body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%234fa3ff' fill-opacity='0.03'%3E%3Ccircle cx='30' cy='30' r='1'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  z-index: 0;
  pointer-events: none;
}

.app {
  position: relative;
  z-index: 1;
  max-width: 480px;
  margin: 0 auto;
  padding: 0 0 120px 0;
  min-height: 100vh;
}

/* ── HEADER ── */
.header {
  padding: 20px 20px 12px;
  position: sticky;
  top: 0;
  z-index: 100;
  background: linear-gradient(to bottom, rgba(5,10,24,0.97) 75%, rgba(5,10,24,0.0));
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
}

.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 4px;
}

.logo-row {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-dot {
  width: 38px;
  height: 38px;
  background: linear-gradient(135deg, #4fa3ff, #7c3aed);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 19px;
  flex-shrink: 0;
  box-shadow: 0 6px 24px rgba(79,163,255,0.45), 0 0 0 1px rgba(255,255,255,0.10);
}

.app-name {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 0.2px;
  background: linear-gradient(90deg, #e8f0ff 0%, #4fa3ff 60%, #818cf8 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.logout-btn {
  background: var(--glass);
  border: 1px solid var(--border2);
  color: var(--text2);
  padding: 8px 16px;
  border-radius: 99px;
  font-size: 13px;
  font-family: inherit;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  box-shadow: 0 4px 16px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.08);
}
.logout-btn:active { opacity: 0.7; }

/* ── SUMMARY CARDS ── */
.summary-strip {
  display: flex;
  gap: 10px;
  padding: 0 16px 18px;
}

.sum-card {
  flex: 1;
  background: var(--glass);
  border: 1px solid var(--border2);
  border-radius: var(--r);
  padding: 14px 12px;
  text-align: center;
  backdrop-filter: blur(28px);
  -webkit-backdrop-filter: blur(28px);
  box-shadow:
    0 8px 32px rgba(0,0,0,0.35),
    0 0 0 1px rgba(255,255,255,0.05) inset,
    0 1px 0 rgba(255,255,255,0.10) inset;
}

.sum-label {
  font-size: 11px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 6px;
}

.sum-value {
  font-size: 18px;
  font-weight: 700;
  font-family: 'DM Mono', monospace;
}

.sum-value.total { color: var(--accent); text-shadow: 0 0 16px rgba(79,163,255,0.5); }
.sum-value.cash-val { color: var(--cash); text-shadow: 0 0 14px rgba(255,209,102,0.4); }
.sum-value.gpay-val { color: var(--gpay); text-shadow: 0 0 14px rgba(129,140,248,0.4); }

/* ── ADD CARD ── */
.add-card {
  margin: 0 16px 20px;
  background: var(--glass2);
  border: 1px solid var(--border2);
  border-radius: var(--r);
  overflow: hidden;
  backdrop-filter: blur(32px);
  -webkit-backdrop-filter: blur(32px);
  box-shadow:
    0 16px 48px rgba(0,0,30,0.5),
    0 0 0 1px rgba(255,255,255,0.06) inset,
    0 1px 0 rgba(255,255,255,0.12) inset,
    0 0 60px rgba(79,163,255,0.08);
}

.add-card-header {
  padding: 16px 18px 0;
  font-size: 11px;
  font-weight: 700;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  opacity: 0.8;
}

.add-card-body {
  padding: 12px 18px 18px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.input-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.input-label {
  font-size: 12px;
  color: var(--text2);
  font-weight: 700;
  letter-spacing: 0.3px;
}

/* ── GLASS INPUTS ── */
.field-input {
  width: 100%;
  padding: 14px 16px;
  background: rgba(255,255,255,0.07);
  border: 1px solid var(--border2);
  border-radius: var(--rs);
  color: var(--text);
  font-size: 15px;
  font-family: 'Comic Sans MS', 'Comic Neue', cursive;
  font-weight: 500;
  transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
  -webkit-appearance: none;
  appearance: none;
  outline: none;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  box-shadow:
    0 4px 16px rgba(0,0,20,0.25),
    inset 0 1px 0 rgba(255,255,255,0.10),
    inset 0 0 0 1px rgba(100,160,255,0.06);
}

.field-input::placeholder { color: var(--muted); }

.field-input:focus {
  border-color: var(--accent);
  background: rgba(79,163,255,0.09);
  box-shadow:
    0 0 0 3px rgba(79,163,255,0.18),
    0 4px 20px rgba(0,0,30,0.3),
    inset 0 1px 0 rgba(255,255,255,0.12);
}

.amount-input {
  font-family: 'DM Mono', monospace;
  font-size: 22px;
  font-weight: 500;
  letter-spacing: -0.5px;
}

/* ── PAY TOGGLE ── */
.pay-toggle-wrap {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.pay-toggle {
  display: flex;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border2);
  border-radius: var(--rs);
  padding: 4px;
  position: relative;
  height: 54px;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  box-shadow: 0 4px 16px rgba(0,0,20,0.25), inset 0 1px 0 rgba(255,255,255,0.08);
}

.pay-toggle input[type="radio"] {
  position: absolute;
  opacity: 0;
  width: 0;
  height: 0;
}

.pay-option {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  border-radius: 9px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 700;
  transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
  color: var(--muted);
  z-index: 1;
  user-select: none;
  letter-spacing: 0.3px;
}

.pay-icon {
  font-size: 18px;
  line-height: 1;
}

.pay-toggle::before {
  content: '';
  position: absolute;
  top: 4px;
  left: 4px;
  width: calc(50% - 4px);
  height: calc(100% - 8px);
  border-radius: 9px;
  background: linear-gradient(135deg, #ffd166, #f59e0b);
  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.3s;
  box-shadow: 0 4px 18px rgba(255,209,102,0.40), inset 0 1px 0 rgba(255,255,255,0.20);
}

#payGpay:checked ~ .pay-toggle::before,
.pay-toggle[data-pay="gpay"]::before {
  transform: translateX(100%);
  background: linear-gradient(135deg, #818cf8, #6366f1);
}

#payCash:checked ~ label[for="payCash"],
label[for="payCash"].active { color: #0a0c10; }

#payGpay:checked ~ label[for="payGpay"],
label[for="payGpay"].active { color: #fff; }

.pay-option.selected-cash { color: #1a1000 !important; }
.pay-option.selected-gpay { color: #fff !important; }

/* ── DONE TOGGLE ── */
.done-toggle {
  display: flex;
  align-items: center;
  gap: 10px;
  color: var(--text2);
  font-size: 14px;
  font-weight: 700;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-radius: var(--rs);
  padding: 12px 14px;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}

.done-toggle input {
  width: 18px;
  height: 18px;
  accent-color: var(--accent);
  flex-shrink: 0;
}

/* ── ADD BUTTON ── */
.add-btn {
  width: 100%;
  padding: 16px;
  background: linear-gradient(135deg, #4fa3ff 0%, #1a6fff 50%, #6366f1 100%);
  color: #fff;
  border: none;
  border-radius: var(--rs);
  font-size: 15px;
  font-family: 'Comic Sans MS', 'Comic Neue', cursive;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.5px;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  box-shadow:
    0 8px 32px rgba(79,163,255,0.40),
    0 2px 8px rgba(0,0,0,0.3),
    inset 0 1px 0 rgba(255,255,255,0.20);
}

.add-btn:active {
  transform: scale(0.97);
  box-shadow: 0 4px 16px rgba(79,163,255,0.25);
}

/* ── LIST ── */
.list-section { padding: 0 16px; }

.list-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
  padding: 0 4px;
}

.list-title {
  font-size: 12px;
  font-weight: 700;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  opacity: 0.7;
}

.list-count {
  font-size: 12px;
  color: var(--text2);
  background: var(--glass);
  padding: 4px 12px;
  border-radius: 99px;
  font-family: 'DM Mono', monospace;
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid var(--border2);
  box-shadow: 0 2px 10px rgba(0,0,20,0.2);
}

.expense-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* ── EXPENSE ITEMS ── */
.expense-item {
  background: var(--glass);
  border: 1px solid var(--border2);
  border-radius: var(--r);
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  transition: all 0.2s;
  animation: slideIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  backdrop-filter: blur(28px);
  -webkit-backdrop-filter: blur(28px);
  box-shadow:
    0 8px 28px rgba(0,0,30,0.40),
    inset 0 1px 0 rgba(255,255,255,0.08),
    0 0 0 1px rgba(255,255,255,0.03) inset;
}

.expense-item:hover {
  border-color: rgba(79,163,255,0.40);
  box-shadow:
    0 8px 32px rgba(0,0,30,0.50),
    0 0 20px rgba(79,163,255,0.08),
    inset 0 1px 0 rgba(255,255,255,0.10);
}

.expense-item.done {
  background: rgba(255,255,255,0.03);
  border-color: rgba(100,160,255,0.12);
}

.expense-item.done .expense-desc,
.expense-item.done .expense-amount,
.expense-item.done .expense-method,
.expense-item.done .expense-date {
  opacity: 0.45;
  text-decoration: line-through;
}

@keyframes slideIn {
  from { opacity: 0; transform: translateY(12px) scale(0.97); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.row-check {
  width: 18px;
  height: 18px;
  accent-color: var(--accent);
  flex-shrink: 0;
}

.pay-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

.pay-dot.cash { background: var(--cash); box-shadow: 0 0 10px rgba(255,209,102,0.6); }
.pay-dot.gpay { background: var(--gpay); box-shadow: 0 0 10px rgba(129,140,248,0.6); }

.expense-desc {
  flex: 1;
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.expense-right {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}

.expense-method {
  font-size: 11px;
  font-weight: 700;
  padding: 3px 9px;
  border-radius: 99px;
  letter-spacing: 0.5px;
}

.expense-method.cash {
  background: rgba(255,209,102,0.12);
  color: var(--cash);
  border: 1px solid rgba(255,209,102,0.28);
}

.expense-method.gpay {
  background: rgba(129,140,248,0.12);
  color: var(--gpay);
  border: 1px solid rgba(129,140,248,0.28);
}

.expense-amount {
  font-family: 'DM Mono', monospace;
  font-size: 16px;
  font-weight: 500;
  color: var(--text);
  min-width: 64px;
  text-align: right;
}

.item-actions { display: flex; gap: 6px; }

/* ── ICON BUTTONS ── */
.icon-btn {
  width: 34px;
  height: 34px;
  border-radius: 9px;
  border: 1px solid var(--border2);
  background: rgba(255,255,255,0.06);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 15px;
  transition: all 0.18s;
  flex-shrink: 0;
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  box-shadow: 0 2px 10px rgba(0,0,20,0.2), inset 0 1px 0 rgba(255,255,255,0.08);
}

.icon-btn:active { transform: scale(0.88); }

.icon-btn.edit { color: var(--accent); }
.icon-btn.edit:hover { background: rgba(79,163,255,0.14); border-color: rgba(79,163,255,0.40); box-shadow: 0 0 14px rgba(79,163,255,0.2); }

.icon-btn.del { color: var(--red); }
.icon-btn.del:hover { background: rgba(255,107,138,0.12); border-color: rgba(255,107,138,0.30); box-shadow: 0 0 14px rgba(255,107,138,0.18); }

.icon-btn.save { color: var(--green); }
.icon-btn.save:hover { background: rgba(90,239,192,0.12); border-color: rgba(90,239,192,0.30); }

.icon-btn.cancel { color: var(--text2); }

/* ── EDITING ROW ── */
.expense-item.editing {
  background: rgba(20,40,100,0.65);
  border-color: var(--accent);
  box-shadow:
    0 0 0 2px rgba(79,163,255,0.20),
    0 12px 36px rgba(0,0,40,0.5),
    inset 0 1px 0 rgba(255,255,255,0.10);
  flex-wrap: wrap;
  gap: 10px;
}

.edit-fields {
  display: flex;
  gap: 8px;
  width: 100%;
  align-items: center;
}

.edit-desc {
  flex: 1;
  padding: 10px 13px;
  background: rgba(255,255,255,0.07);
  border: 1px solid var(--border2);
  border-radius: 9px;
  color: var(--text);
  font-size: 14px;
  font-family: 'Comic Sans MS', 'Comic Neue', cursive;
  font-weight: 500;
  outline: none;
  min-width: 0;
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
}

.edit-desc:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(79,163,255,0.15), inset 0 1px 0 rgba(255,255,255,0.10); }

.edit-amount {
  width: 90px;
  padding: 10px 10px;
  background: rgba(255,255,255,0.07);
  border: 1px solid var(--border2);
  border-radius: 9px;
  color: var(--text);
  font-size: 14px;
  font-family: 'DM Mono', monospace;
  outline: none;
  text-align: right;
  flex-shrink: 0;
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
}

.edit-amount:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(79,163,255,0.15); }

.edit-pay-toggle {
  display: flex;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border2);
  border-radius: 9px;
  padding: 3px;
  gap: 2px;
  flex-shrink: 0;
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
}

.edit-pay-opt {
  padding: 6px 10px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  color: var(--muted);
  transition: all 0.2s;
  white-space: nowrap;
}

.edit-pay-opt.active-cash {
  background: linear-gradient(135deg, #ffd166, #f59e0b);
  color: #1a1000;
  box-shadow: 0 2px 10px rgba(255,209,102,0.35);
}

.edit-pay-opt.active-gpay {
  background: linear-gradient(135deg, #818cf8, #6366f1);
  color: #fff;
  box-shadow: 0 2px 10px rgba(129,140,248,0.35);
}

/* ── EMPTY STATE ── */
.empty {
  text-align: center;
  padding: 52px 20px;
  color: var(--muted);
}

.empty-icon { font-size: 44px; margin-bottom: 14px; filter: drop-shadow(0 0 16px rgba(79,163,255,0.3)); }
.empty-title { font-size: 16px; font-weight: 700; margin-bottom: 6px; color: var(--text2); }
.empty-sub { font-size: 13px; }

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: rgba(10,20,60,0.90);
  border: 1px solid var(--border2);
  color: var(--text);
  padding: 13px 24px;
  border-radius: 99px;
  font-size: 14px;
  font-weight: 600;
  box-shadow: 0 8px 40px rgba(0,0,30,0.6), 0 0 20px rgba(79,163,255,0.10);
  z-index: 999;
  opacity: 0;
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  white-space: nowrap;
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

.toast.success { border-color: rgba(79,163,255,0.50); color: var(--accent); box-shadow: 0 8px 40px rgba(0,0,30,0.6), 0 0 24px rgba(79,163,255,0.18); }
.toast.error { border-color: rgba(255,107,138,0.45); color: var(--red); }

/* ── SAVING BAR ── */
.saving-bar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, #1a6fff, #4fa3ff, #818cf8, #4fa3ff);
  background-size: 200% 100%;
  z-index: 200;
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.4s;
}
.saving-bar.active { transform: scaleX(1); animation: shimmer 1.4s linear infinite; }

@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* ── DATE ── */
.expense-date {
  font-size: 10px;
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  display: block;
  margin-top: 2px;
}

input[type="number"]::-webkit-inner-spin-button,
input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
input[type="number"] { -moz-appearance: textfield; }
</style>
</head>
<body>

<div class="saving-bar" id="savingBar"></div>

<div class="app">

  <div class="header">
    <div class="header-top">
      <div class="logo-row">
        <div class="logo-dot">💸</div>
        <span class="app-name">KRD's Expenses</span>
      </div>
     
    </div>
  </div>

  <div class="summary-strip">
    <div class="sum-card">
      <div class="sum-label">Total</div>
      <div class="sum-value total" id="sumTotal">₹0</div>
    </div>
    <div class="sum-card">
      <div class="sum-label">💵 Cash</div>
      <div class="sum-value cash-val" id="sumCash">₹0</div>
    </div>
    <div class="sum-card">
      <div class="sum-label">📱 GPay</div>
      <div class="sum-value gpay-val" id="sumGpay">₹0</div>
    </div>
  </div>

  <div class="add-card">
    <div class="add-card-header">New Expense</div>
    <div class="add-card-body">

      <div class="input-group">
        <label class="input-label">Description</label>
        <input
          id="newDesc"
          class="field-input"
          type="text"
          placeholder="e.g. Coffee, Auto fare…"
          autocomplete="off"
        />
      </div>

      <div class="input-group">
        <label class="input-label">Amount (₹)</label>
        <input
          id="newAmount"
          class="field-input amount-input"
          type="number"
          inputmode="decimal"
          placeholder="0.00"
          step="0.01"
          min="0"
        />
      </div>

      <div class="pay-toggle-wrap">
        <label class="input-label">Payment Method</label>
        <div class="pay-toggle" id="payToggle">
          <label class="pay-option" id="optCash" onclick="selectPay('cash')">
            <span class="pay-icon">💵</span> Cash
          </label>
          <label class="pay-option" id="optGpay" onclick="selectPay('gpay')">
            <span class="pay-icon">📱</span> GPay
          </label>
        </div>
      </div>


      <button class="add-btn" id="addBtn">
        <span>+</span> Add Expense
      </button>
    </div>
  </div>

  <div class="list-section">
    <div class="list-header">
      <span class="list-title">Expenses</span>
      <span class="list-count" id="listCount">0 entries</span>
    </div>
    <div class="expense-list" id="expenseList">
      <div class="empty" id="emptyState">
        <div class="empty-icon">🧾</div>
        <div class="empty-title">No expenses yet</div>
        <div class="empty-sub">Add your first expense above</div>
      </div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const OWNER = 'shadow-wolf-forge';
const REPO  = 'KRD-s-Expense-Tracker';
const FILE  = 'expenses.json';

const T1 = 'github_pat_11BXK4LGI0tSbhvYpXOa3g_';
const T2 = '4S8RKNeE1lyKSSeSZbYMTjPp8ULQETFfiSY';
const T3 = 'nkgmT4q83T6FH56Qr7WDOZGu';
const GITHUB_TOKEN = T1 + T2 + T3;

let token = GITHUB_TOKEN;
let expenses = [];
let sha = null;
let selectedPay = 'cash';

function enc(str) { return btoa(unescape(encodeURIComponent(str))); }
function dec(b64) { return decodeURIComponent(escape(atob(b64))); }
function headers() {
  return {
    'Authorization': 'token ' + token,
    'Accept': 'application/vnd.github+json',
    'Content-Type': 'application/json'
  };
}

function fmt(n) {
  return '₹' + Number(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}

function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('en-IN', { day:'2-digit', month:'short', timeZone:'Asia/Kolkata' });
}

function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type + ' show';
  clearTimeout(t._t);
  t._t = setTimeout(() => t.className = 'toast', 2400);
}

function setSaving(on) {
  document.getElementById('savingBar').classList.toggle('active', on);
}

function normalizeExpenses(items) {
  return (items || []).map(item => ({
    ...item,
    done: Boolean(item.done)
  }));
}

function selectPay(method) {
  selectedPay = method;
  const toggle = document.getElementById('payToggle');
  const optCash = document.getElementById('optCash');
  const optGpay = document.getElementById('optGpay');

  if (method === 'cash') {
    toggle.setAttribute('data-pay', 'cash');
    optCash.className = 'pay-option selected-cash';
    optGpay.className = 'pay-option';
  } else {
    toggle.setAttribute('data-pay', 'gpay');
    optGpay.className = 'pay-option selected-gpay';
    optCash.className = 'pay-option';
  }
}

const styleEl = document.createElement('style');
styleEl.textContent = `
  .pay-toggle[data-pay="gpay"]::before {
    transform: translateX(100%) !important;
    background: linear-gradient(135deg, #818cf8, #6366f1) !important;
    box-shadow: 0 4px 18px rgba(129,140,248,0.40) !important;
  }
  .pay-toggle[data-pay="cash"]::before {
    transform: translateX(0) !important;
    background: linear-gradient(135deg, #ffd166, #f59e0b) !important;
    box-shadow: 0 4px 18px rgba(255,209,102,0.40) !important;
  }
`;
document.head.appendChild(styleEl);

selectPay('cash');

async function load() {
  setSaving(true);
  try {
    const url = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE}`;
    const res = await fetch(url, { headers: headers() });

    if (res.status === 404) {
      expenses = [];
      sha = null;
      render();
      return;
    }
    if (!res.ok) throw new Error(res.status);

    const data = await res.json();
    sha = data.sha;
    expenses = normalizeExpenses(JSON.parse(dec(data.content)));
    render();
  } catch (e) {
    showToast('Load failed: ' + e.message, 'error');
  } finally {
    setSaving(false);
  }
}

async function save(msg) {
  setSaving(true);
  const url = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE}`;
  const body = {
    message: msg,
    content: enc(JSON.stringify(expenses, null, 2))
  };
  if (sha) body.sha = sha;

  try {
    const res = await fetch(url, {
      method: 'PUT',
      headers: headers(),
      body: JSON.stringify(body)
    });
    const data = await res.json();

    if (!res.ok) {
      if (res.status === 409 || res.status === 422) {
        await load();
        return;
      }
      throw new Error(data.message || res.status);
    }

    sha = data.content.sha;
    render();
    showToast('Saved ✓');
  } catch (e) {
    showToast('Save failed: ' + e.message, 'error');
  } finally {
    setSaving(false);
  }
}

function updateSummary() {
  const total = expenses.reduce((s, e) => s + Number(e.amount), 0);
  const cash  = expenses.filter(e => e.method === 'cash').reduce((s, e) => s + Number(e.amount), 0);
  const gpay  = expenses.filter(e => e.method === 'gpay').reduce((s, e) => s + Number(e.amount), 0);

  document.getElementById('sumTotal').textContent = fmt(total);
  document.getElementById('sumCash').textContent  = fmt(cash);
  document.getElementById('sumGpay').textContent  = fmt(gpay);

  const cnt = expenses.length;
  document.getElementById('listCount').textContent = cnt + (cnt === 1 ? ' entry' : ' entries');
}

function render() {
  updateSummary();
  const list = document.getElementById('expenseList');
  list.innerHTML = '';

  if (expenses.length === 0) {
    list.innerHTML = `
      <div class="empty" id="emptyState">
        <div class="empty-icon">🧾</div>
        <div class="empty-title">No expenses yet</div>
        <div class="empty-sub">Add your first expense above</div>
      </div>`;
    return;
  }

  [...expenses].reverse().forEach((exp, revIdx) => {
    const idx = expenses.length - 1 - revIdx;
    list.appendChild(buildRow(exp, idx));
  });
}

function buildRow(exp, idx) {
  const div = document.createElement('div');
  div.className = 'expense-item' + (exp.done ? ' done' : '');
  div.dataset.idx = idx;

  div.innerHTML = `
    <input class="row-check" type="checkbox" ${exp.done ? 'checked' : ''} onchange="toggleDone(${idx}, this.checked)" title="Mark complete">
    <div class="pay-dot ${exp.method}"></div>
    <div style="flex:1; min-width:0;">
      <div class="expense-desc">${escHtml(exp.description)}</div>
      <span class="expense-date">${fmtDate(exp.created_at)}</span>
    </div>
    <div class="expense-right">
      <span class="expense-method ${exp.method}">${exp.method === 'cash' ? 'Cash' : 'GPay'}</span>
      <span class="expense-amount">${fmt(exp.amount)}</span>
      <div class="item-actions">
        <button class="icon-btn edit" onclick="startEdit(${idx})" title="Edit">✏️</button>
        <button class="icon-btn del" onclick="deleteExp(${idx})" title="Delete">🗑️</button>
      </div>
    </div>
  `;
  return div;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

document.getElementById('addBtn').onclick = async () => {
  const desc   = document.getElementById('newDesc').value.trim();
  const amount = parseFloat(document.getElementById('newAmount').value);
  const done   = false;

  if (!desc) {
    showToast('Enter a description', 'error');
    document.getElementById('newDesc').focus();
    return;
  }
  if (!amount || amount <= 0) {
    showToast('Enter a valid amount', 'error');
    document.getElementById('newAmount').focus();
    return;
  }

  const now = new Date().toISOString();
  expenses.push({
    id: Date.now() + Math.random(),
    description: desc,
    amount: amount,
    method: selectedPay,
    done: done,
    created_at: now
  });

  document.getElementById('newDesc').value   = '';
  document.getElementById('newAmount').value = '';
  
  selectPay('cash');

  await save('Add expense: ' + desc);
};

document.getElementById('newAmount').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('addBtn').click();
});

function startEdit(idx) {
  const exp = expenses[idx];
  const list = document.getElementById('expenseList');
  const row = list.querySelector(`[data-idx="${idx}"]`);
  if (!row) return;

  let editPay = exp.method;

  row.className = 'expense-item editing';
  row.innerHTML = `
    <div class="edit-fields">
      <input class="edit-desc" value="${escHtml(exp.description)}" placeholder="Description" />
      <input class="edit-amount" type="number" inputmode="decimal" step="0.01" value="${Number(exp.amount).toFixed(2)}" />
      <div class="edit-pay-toggle" id="editToggle_${idx}">
        <div class="edit-pay-opt ${editPay === 'cash' ? 'active-cash' : ''}" id="eOptCash_${idx}" onclick="setEditPay(${idx},'cash')">💵</div>
        <div class="edit-pay-opt ${editPay === 'gpay' ? 'active-gpay' : ''}" id="eOptGpay_${idx}" onclick="setEditPay(${idx},'gpay')">📱</div>
      </div>
      <button class="icon-btn save" onclick="saveEdit(${idx})" title="Save">✅</button>
      <button class="icon-btn cancel" onclick="render()" title="Cancel">✖️</button>
    </div>
  `;

  row._editPay = editPay;
  row.querySelector('.edit-desc').focus();
}

function setEditPay(idx, method) {
  const row = document.getElementById('expenseList').querySelector(`[data-idx="${idx}"]`);
  if (!row) return;
  row._editPay = method;

  const c = document.getElementById(`eOptCash_${idx}`);
  const g = document.getElementById(`eOptGpay_${idx}`);
  c.className = 'edit-pay-opt' + (method === 'cash' ? ' active-cash' : '');
  g.className = 'edit-pay-opt' + (method === 'gpay' ? ' active-gpay' : '');
}

async function saveEdit(idx) {
  const row  = document.getElementById('expenseList').querySelector(`[data-idx="${idx}"]`);
  const desc = row.querySelector('.edit-desc').value.trim();
  const amt  = parseFloat(row.querySelector('.edit-amount').value);
  const method = row._editPay || expenses[idx].method;

  if (!desc) { showToast('Description required', 'error'); return; }
  if (!amt || amt <= 0) { showToast('Valid amount required', 'error'); return; }

  expenses[idx].description = desc;
  expenses[idx].amount      = amt;
  expenses[idx].method      = method;

  await save('Edit expense: ' + desc);
}

async function toggleDone(idx, checked) {
  expenses[idx].done = checked;
  await save((checked ? 'Complete expense: ' : 'Reopen expense: ') + expenses[idx].description);
}

async function deleteExp(idx) {
  const exp = expenses[idx];
  if (!confirm(`Delete "${exp.description}"?`)) return;
  expenses.splice(idx, 1);
  await save('Delete expense: ' + exp.description);
}



load();
</script>
</body>
</html>
